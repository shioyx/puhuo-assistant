<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1688铺货助手Pro — 抖音小店专业版</title>
<link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app">
  <!-- ════ 左侧边栏 ════ -->
  <div id="sidebar">
    <!-- Logo -->
    <div id="sb-logo" onclick="sbToggle()">
      <div class="logo-icon">🛍️</div>
      <div class="logo-text">
        <div class="t1">铺货助手Pro</div>
        <div class="t2">抖音小店专业版</div>
      </div>
    </div>

    <!-- 1688采集入口（核心功能突出显示） -->
    <div id="sb-1688-btn" onclick="enterBrowserMode()">
      <span style="font-size:16px">🔍</span>
      <span>打开1688采集</span>
    </div>

    <!-- 导航菜单 -->
    <div id="sb-scroll">
      <div id="sb-nav"></div>
    </div>

    <!-- 底部折叠 -->
    <div style="padding:8px 12px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0">
      <div class="sb-item" onclick="sbToggle()" style="color:rgba(255,255,255,.4);font-size:11px">
        <span class="si">◀</span><span class="sl">收起侧栏</span>
      </div>
    </div>
  </div>

  <!-- ════ 右侧区域 ════ -->
  <div id="right-area">

    <!-- 顶部栏 -->
    <div id="topbar">
      <!-- 面包屑 -->
      <div class="topbar-breadcrumb" id="tb-breadcrumb">
        <span>首页</span>
      </div>

      <!-- 全局搜索 -->
      <div style="flex:1;max-width:320px;margin:0 12px;position:relative">
        <input id="global-search" class="inp" placeholder="搜索功能、商品ID..."
          style="width:100%;padding-left:30px;height:30px;font-size:12px"
          onkeydown="if(event.key==='Enter')globalSearch(this.value)">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--T3);font-size:13px">🔍</span>
      </div>

      <div style="flex:1"></div>

      <!-- 采集箱快捷入口 -->
      <div class="browser-tab" onclick="nav('collect_box')" id="tb-box-btn">
        📦 采集箱 <span id="tb-box-count" style="background:var(--P);color:#fff;border-radius:10px;padding:0 5px;font-size:10px;font-weight:700">0</span>
      </div>

      <!-- 打开1688按钮 -->
      <div class="browser-tab active" onclick="enterBrowserMode()" style="background:linear-gradient(135deg,#FF6A00,#EE0979);border:none;color:#fff;font-weight:700">
        🔍 1688采集
      </div>

      <!-- AI算力 -->
      <div style="display:flex;align-items:center;gap:6px;background:var(--B2);border-radius:8px;padding:4px 10px;font-size:12px">
        <span style="color:var(--T3)">AI算力</span>
        <span id="ai-power" style="font-weight:700;color:var(--P)">0 个</span>
      </div>

      <!-- 充值 -->
      <button class="btn btn-primary btn-sm" onclick="toast('请在Anthropic官网获取API Key','info')">充值算力</button>

      <!-- 店铺名 -->
      <div id="shop-info" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--T2);cursor:pointer" onclick="nav('multi_shop')">
        🏪 <span id="shop-name-tb">未授权店铺</span>
      </div>

      <div style="font-size:18px;cursor:pointer;color:var(--T3)" onclick="nav('settings')">⚙️</div>
    </div>

    <!-- ════ 主内容区（正常页面） ════ -->
    <div id="main-content">
      <div id="page-scroll"></div>
    </div>

    <!-- ════ 1688内嵌浏览器模式 ════ -->
    <div id="browser-mode">
      <!-- 浏览器工具栏 -->
      <div id="browser-toolbar">
        <div class="btn-icon" onclick="exitBrowserMode()" title="关闭1688浏览器，返回工具">✕</div>
        <div class="btn-icon" onclick="browserGoBack()" title="后退">←</div>
        <div class="btn-icon" onclick="browserRefresh()" title="刷新">↻</div>

        <!-- 搜索框 -->
        <div style="position:relative;width:220px;flex-shrink:0">
          <input id="browser-search" class="inp"
            style="width:100%;padding:0 10px 0 28px;height:30px;font-size:12px"
            placeholder="输入关键词搜1688..."
            onkeydown="if(event.key==='Enter')browserSearch1688()">
          <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--T3)">🔍</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="browserSearch1688()" style="flex-shrink:0">搜索</button>

        <!-- URL栏 -->
        <input id="browser-urlbar" class="inp"
          style="height:30px;font-size:11px;font-family:monospace;flex:1"
          placeholder="输入1688链接..."
          onkeydown="if(event.key==='Enter')browserNav(this.value)">

        <!-- 快捷链接 -->
        <div style="display:flex;gap:4px;flex-shrink:0">
          <div class="browser-tab" onclick="browserNav('https://www.1688.com')">1688首页</div>
          <div class="browser-tab" onclick="browserNav('https://ai.1688.com/')">AI工作台</div>
        </div>

        <!-- 退出 -->
        <button class="btn btn-default btn-sm" onclick="exitBrowserMode()" style="flex-shrink:0">退出浏览器</button>
      </div>

      <!-- 主体：快捷链接 + iframe -->
      <div id="browser-body">
        <!-- 左侧分类快捷链接 -->
        <div id="browser-quicklinks">
          <div style="padding:8px 12px 4px;font-size:10px;color:rgba(255,255,255,.4);background:#1A1F35;font-weight:600">热门品类</div>
          <!-- 快捷链接由JS填充 -->
          <div id="bql-list"></div>
          <div style="padding:8px 12px 4px;margin-top:8px;font-size:10px;color:var(--T3);font-weight:600;border-top:1px solid var(--BD)">常用功能</div>
          <div class="bql-item" onclick="browserNav('https://www.1688.com/chanpin/yijiandaifa.html')">一件代发</div>
          <div class="bql-item" onclick="browserNav('https://s.1688.com/selloffer/offer_search.htm?n=y&spm=a26352.13672862.searchbar.ddropShippingType&button_click=top&keywords=')">支持抖音面单</div>
          <div class="bql-item" onclick="exitBrowserMode();nav('goods_collect')">返回选品中心</div>
          <div class="bql-item" onclick="exitBrowserMode();nav('collect_box')">查看采集箱</div>
        </div>

        <!-- iframe区 -->
        <div id="iframe-wrap">
          <div class="iframe-loading" id="iframe-loading">
            <div style="text-align:center">
              <div class="spinner" style="margin:0 auto 10px"></div>
              <div style="font-size:12px;color:var(--T3)">正在加载1688...</div>
            </div>
          </div>
          <iframe id="1688-iframe"
            src="about:blank"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-top-navigation"
            referrerpolicy="no-referrer"
            onload="document.getElementById('iframe-loading').style.display='none'"
            onerror="handleIframeError()">
          </iframe>
        </div>
      </div>

      <!-- 采集浮动按钮 -->
      <button id="scrape-fab" onclick="browserScrapeCurrentPage()">
        <span style="font-size:20px">📥</span>
        <span>采集当前页</span>
      </button>
    </div>

  </div>
</div>

<!-- 通知/Toast容器 -->
<div id="toast-container"></div>
<!-- Modal容器 -->
<div id="modal-overlay" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;align-items:center;justify-content:center"></div>

<script src="app.js"></script>
</body>
</html>
